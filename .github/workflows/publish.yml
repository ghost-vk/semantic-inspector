name: Publish

# Publishes to npm via OIDC Trusted Publishing when a GitHub Release is published.
# Prerequisite: configure a Trusted Publisher (this repo + this workflow) on npmjs.com, then
# delete any legacy NPM_TOKEN secret. Tag the release vX.Y.Z; the tag is verified against
# package.json "version" below. See RELEASING.md.
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for npm provenance + OIDC Trusted Publishing

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm-production
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      # OIDC Trusted Publishing needs npm >= 11.5.
      - run: npm install -g npm@latest
      - run: npm ci
      - name: Verify release tag matches package.json version
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG=${GITHUB_REF_NAME#v}
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::Release tag $GITHUB_REF_NAME does not match package.json version $PKG"
            exit 1
          fi
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run lint:pkg
      - run: npm run test:dist
      # OIDC mints a short-lived token in-job; no NPM_TOKEN needed.
      - run: npm publish --provenance --access public

  verify-published:
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Install the published version from npm and smoke-test it
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p /tmp/smoke && cd /tmp/smoke
          npm init -y >/dev/null
          npm i "semantic-inspector@$VERSION" @babel/core
          node -e "const b = require('semantic-inspector/babel'); if (typeof b.stampLocBabel !== 'function') { throw new Error('babel entry not callable'); }"
          node --input-type=module -e "import('semantic-inspector').then((m) => { if (!m.SemanticInspector || !m.useInspector) { process.exit(1); } })"
          # The published bin must run and report the version it was published as.
          VER_OUT=$(npx --no-install semantic-inspector --version)
          if [ "$VER_OUT" != "$VERSION" ]; then
            echo "::error::published bin --version ($VER_OUT) does not match $VERSION"
            exit 1
          fi
          # `check --json` on a clean tree must exit 0 and emit the documented agent-contract key set.
          mkdir -p sub/.semantic-inspector
          echo '{"version":1,"annotations":{}}' > sub/.semantic-inspector/annotations.json
          npx --no-install semantic-inspector check --json --root sub > report.json
          node -e "const r = require('./report.json'); for (const k of ['drifted','ok','skipped','entries']) { if (!(k in r)) { console.error('::error::--json report missing key '+k); process.exit(1); } } if (!Array.isArray(r.entries)) { console.error('::error::entries not an array'); process.exit(1); } console.log('bin e2e ok');"
